<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Account Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="card shadow-lg">
        
        <!-- Header -->
        <div class="card-header bg-primary text-white text-center">
            <h3>Bank Account Registration Form</h3>
        </div>

        <!-- Form Body -->
        <div class="card-body">
            <form>

                <!-- Personal Information -->
                <h5 class="mb-3 text-secondary">Personal Information</h5>
                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter full name" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-control" placeholder="Enter phone number" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="Enter email" required>
                    </div>
                </div>

                <!-- Account Details -->
                <h5 class="mt-4 mb-3 text-secondary">Account Details</h5>

                <div class="mb-3">
                    <label class="form-label d-block">Account Type</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="accountType" required>
                        <label class="form-check-label">Savings Account</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="accountType">
                        <label class="form-check-label">Current Account</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="accountType">
                        <label class="form-check-label">Joint Account</label>
                    </div>
                </div>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Initial Deposit Amount</label>
                        <input type="number" class="form-control" placeholder="Enter deposit amount" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Occupation</label>
                        <input type="text" class="form-control" placeholder="Enter occupation" required>
                    </div>
                </div>

                <!-- Identification -->
                <h5 class="mt-4 mb-3 text-secondary">Identification Details</h5>

                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">ID Type</label>
                        <select class="form-select" required>
                            <option value="">Select ID Type</option>
                            <option>Aadhar Card</option>
                            <option>Passport</option>
                            <option>Driving License</option>
                            <option>Voter ID</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">ID Number</label>
                        <input type="text" class="form-control" placeholder="Enter ID number" required>
                    </div>
                </div>

                <!-- Declaration -->
                <div class="form-check mt-4">
                    <input class="form-check-input" type="checkbox" required>
                    <label class="form-check-label">
                        I confirm that the information provided is accurate and agree to the bank’s terms and conditions.
                    </label>
                </div>

                <!-- Submit -->
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary px-5">Submit Application</button>
                    <button type="reset" class="btn btn-outline-secondary px-4 ms-2">Reset</button>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
